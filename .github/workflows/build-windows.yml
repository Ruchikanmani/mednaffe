name: build-windows

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: mednaffe-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            autoconf
            automake
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-python
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-pkgconf

      - name: Regenerate 64-bit Windows resource
        run: /mingw64/bin/windres -O coff -i share/win/mednaffe.rc -o share/win/mednaffe.res

      - name: Configure
        run: ./configure --host=x86_64-w64-mingw32 --prefix=/usr

      - name: Build
        run: make -j"$(nproc)"

      - name: Stage portable bundle
        run: |
          rm -rf dist
          mkdir -p dist/mednaffe-windows-x86_64/share dist/mednaffe-windows-x86_64/share/icons dist/mednaffe-windows-x86_64/lib dist/mednaffe-windows-x86_64/etc
          install -m 755 src/mednaffe.exe dist/mednaffe-windows-x86_64/mednaffe.exe
          cp share/win/README_WINDOWS.txt share/win/NOTICE.txt share/win/ChangeLog_Mednaffe.txt dist/mednaffe-windows-x86_64/
          cp README README.md COPYING AUTHORS ChangeLog dist/mednaffe-windows-x86_64/
          cp -r /mingw64/share/glib-2.0 dist/mednaffe-windows-x86_64/share/
          cp -r /mingw64/share/icons/Adwaita dist/mednaffe-windows-x86_64/share/icons/
          cp -r /mingw64/share/icons/hicolor dist/mednaffe-windows-x86_64/share/icons/
          if [ -d /mingw64/share/themes/Default ]; then
            mkdir -p dist/mednaffe-windows-x86_64/share/themes
            cp -r /mingw64/share/themes/Default dist/mednaffe-windows-x86_64/share/themes/
          fi
          cp -r /mingw64/share/fontconfig dist/mednaffe-windows-x86_64/share/
          cp -r /mingw64/etc/fonts dist/mednaffe-windows-x86_64/etc/
          if [ -d /mingw64/etc/gtk-3.0 ]; then
            cp -r /mingw64/etc/gtk-3.0 dist/mednaffe-windows-x86_64/etc/
          fi
          mkdir -p dist/mednaffe-windows-x86_64/lib/gdk-pixbuf-2.0/2.10.0
          cp -r /mingw64/lib/gdk-pixbuf-2.0/2.10.0/loaders dist/mednaffe-windows-x86_64/lib/gdk-pixbuf-2.0/2.10.0/
          glib-compile-schemas dist/mednaffe-windows-x86_64/share/glib-2.0/schemas
          install -m 755 /mingw64/bin/gdk-pixbuf-query-loaders.exe dist/mednaffe-windows-x86_64/gdk-pixbuf-query-loaders.exe
          install -m 755 /mingw64/bin/gspawn-win64-helper.exe dist/mednaffe-windows-x86_64/gspawn-win64-helper.exe
          install -m 755 /mingw64/bin/gspawn-win64-helper-console.exe dist/mednaffe-windows-x86_64/gspawn-win64-helper-console.exe
          ldd_re='=>[[:space:]]+(/[^[:space:]]+)[[:space:]]+\('
          copy_mingw_deps() {
            local target="$1"
            local line dep
            while IFS= read -r line; do
              if [[ "$line" =~ $ldd_re ]]; then
                dep="${BASH_REMATCH[1]}"
                case "$dep" in
                  /mingw64/bin/*)
                    cp -f "$dep" dist/mednaffe-windows-x86_64/
                    ;;
                esac
              fi
            done < <(ldd "$target")
          }

          copy_mingw_deps src/mednaffe.exe
          copy_mingw_deps /mingw64/bin/gdk-pixbuf-query-loaders.exe
          copy_mingw_deps /mingw64/bin/gspawn-win64-helper.exe
          copy_mingw_deps /mingw64/bin/gspawn-win64-helper-console.exe

          shopt -s nullglob
          for loader in dist/mednaffe-windows-x86_64/lib/gdk-pixbuf-2.0/2.10.0/loaders/*.dll; do
            copy_mingw_deps "$loader"
          done
          cat > dist/mednaffe-windows-x86_64/mednaffe.cmd <<'EOF'
          @echo off
          setlocal
          powershell -NoProfile -ExecutionPolicy Bypass -File "%~dp0mednaffe-launch.ps1" %*
          EOF
          cat > dist/mednaffe-windows-x86_64/mednaffe-launch.ps1 <<'EOF'
          $Root = Split-Path -Parent $MyInvocation.MyCommand.Path
          $env:PATH = "$Root;$env:PATH"
          $env:XDG_DATA_DIRS = Join-Path $Root 'share'
          $env:GSETTINGS_SCHEMA_DIR = Join-Path $Root 'share\glib-2.0\schemas'
          $env:GTK_EXE_PREFIX = $Root
          $env:GTK_DATA_PREFIX = $Root
          $env:FONTCONFIG_PATH = Join-Path $Root 'etc\fonts'
          $env:FONTCONFIG_FILE = Join-Path $Root 'etc\fonts\fonts.conf'
          $env:GDK_PIXBUF_MODULEDIR = Join-Path $Root 'lib\gdk-pixbuf-2.0\2.10.0\loaders'
          $GtkRuntimeDir = Join-Path $Root 'etc\gtk-runtime'
          New-Item -ItemType Directory -Force -Path $GtkRuntimeDir | Out-Null
          $LoaderCache = Join-Path $GtkRuntimeDir 'loaders.cache'
          $LoaderDlls = Get-ChildItem -Path (Join-Path $env:GDK_PIXBUF_MODULEDIR '*.dll') | Select-Object -ExpandProperty FullName
          & (Join-Path $Root 'gdk-pixbuf-query-loaders.exe') $LoaderDlls | Set-Content -Encoding ascii -Path $LoaderCache
          $env:GDK_PIXBUF_MODULE_FILE = $LoaderCache
          & (Join-Path $Root 'mednaffe.exe') @args
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mednaffe-windows-x86_64
          path: dist/mednaffe-windows-x86_64/
          if-no-files-found: error
