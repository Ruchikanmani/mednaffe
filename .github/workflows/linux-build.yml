name: build-linux

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: mednaffe-linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            pkg-config \
            libgtk-3-dev

      - name: Regenerate autotools files
        run: autoreconf -fi

      - name: Configure
        run: ./configure --prefix=/usr

      - name: Build
        run: make -j"$(nproc)"

      - name: Stage artifact
        run: |
          rm -rf dist
          mkdir -p dist/mednaffe-linux-x86_64/share
          install -m 755 src/mednaffe dist/mednaffe-linux-x86_64/mednaffe
          cp README README.md COPYING AUTHORS ChangeLog dist/mednaffe-linux-x86_64/
          cp -r share/applications dist/mednaffe-linux-x86_64/share/
          cp -r share/icons dist/mednaffe-linux-x86_64/share/
          cp -r share/pixmaps dist/mednaffe-linux-x86_64/share/

      - name: Create tarball
        run: |
          tar -C dist -czf dist/mednaffe-linux-x86_64.tar.gz mednaffe-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mednaffe-linux-x86_64
          path: dist/mednaffe-linux-x86_64.tar.gz
          if-no-files-found: error
